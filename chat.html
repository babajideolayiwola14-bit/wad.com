<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Chat</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Modal -->
    <div id="login-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Login to Chat</h2>
                <button id="close-modal" class="close-btn">&times;</button>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Username:</label>
                    <input type="text" id="login-username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password:</label>
                    <input type="password" id="login-password" name="password" required>
                </div>
                <button type="submit" class="submit-btn">Login</button>
                <div id="login-error" class="error"></div>
            </form>
            <div class="modal-footer">
                <p>Don't have an account? <a href="#" id="toggle-register">Register here</a></p>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create Account</h2>
                <button id="close-register-modal" class="close-btn">&times;</button>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label for="register-username">Username:</label>
                    <input type="text" id="register-username" name="username" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Password:</label>
                    <input type="password" id="register-password" name="password" required>
                    <small>Min 8 chars, 1 uppercase, 1 lowercase, 1 number</small>
                </div>
                <div class="form-group">
                    <label for="register-state">State:</label>
                    <select id="register-state" name="state" required></select>
                </div>
                <div class="form-group">
                    <label for="register-lga">LGA:</label>
                    <select id="register-lga" name="lga" required></select>
                </div>
                <button type="submit" class="submit-btn">Register</button>
                <div id="register-error" class="error"></div>
            </form>
            <div class="modal-footer">
                <p>Already have an account? <a href="#" id="toggle-login">Login here</a></p>
            </div>
        </div>
    </div>

    <!-- Chat Container -->
    <div class="chat-container">
        <div class="chat-header">
            <h2>Welcome to Web Chat</h2>
            <div id="user-info" class="user-info hidden">
                <span id="current-user"></span>
                <button id="logout" class="logout-btn">Logout</button>
            </div>
            <div id="guest-badge" class="guest-badge">Guest (Read-Only)</div>
        </div>

        <div id="chat-messages"></div>

        <form id="message-form-wrapper">
            <textarea id="message" placeholder="Login to chat..." disabled></textarea>
            <button type="submit" id="send-btn" disabled>Send</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
