services:
  - type: web
    name: web-chat-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: web-chat-db
          property: connectionString

databases:
  - name: web-chat-db
    plan: free
