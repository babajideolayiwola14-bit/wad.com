<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reset Password</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .reset-container{max-width:420px;margin:40px auto;padding:20px;border:1px solid #eee;border-radius:6px;background:#fff}
    .form-group{margin-bottom:12px}
    label{display:block;margin-bottom:6px}
    input[type="text"],input[type="password"]{width:100%;padding:8px;border:1px solid #ccc;border-radius:4px}
    button{padding:10px 14px;border:none;border-radius:4px;background:#007bff;color:#fff;cursor:pointer}
    .msg{margin-top:12px;font-size:14px}
  </style>
</head>
<body>
  <div class="reset-container">
    <h2>Reset your password</h2>
    <form id="reset-form">
      <div class="form-group">
        <label for="token">Reset token</label>
        <input type="text" id="token" name="token" placeholder="Paste your token here or use link" required>
      </div>
      <div class="form-group">
        <label for="password">New password</label>
        <div style="display: flex; align-items: center; gap: 8px;">
          <input type="password" id="password" name="password" placeholder="New password" required>
          <button type="button" id="toggle-reset-password" style="padding: 6px 10px; background: none; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 14px;">👁️</button>
        </div>
      </div>
      <div class="form-group">
        <label for="password2">Confirm new password</label>
        <div style="display: flex; align-items: center; gap: 8px;">
          <input type="password" id="password2" name="password2" placeholder="Confirm new password" required>
          <button type="button" id="toggle-reset-password2" style="padding: 6px 10px; background: none; border: 1px solid #ccc; border-radius: 4px; cursor: pointer; font-size: 14px;">👁️</button>
        </div>
      </div>
      <button type="submit">Set new password</button>
    </form>
    <div id="message" class="msg"></div>
    <p style="margin-top:12px;font-size:13px;color:#666">If you received a reset link in email, it should open this page with the token in the URL (e.g. <em>?token=...</em>).</p>
    <p style="margin-top:8px"><a href="index.html">Back to Login</a></p>
  </div>

  <script>
    function qs(name){
      const url = new URL(window.location.href);
      return url.searchParams.get(name);
    }

    document.addEventListener('DOMContentLoaded', () => {
      const tokenInput = document.getElementById('token');
      const token = qs('token');
      if (token) tokenInput.value = token;

      const form = document.getElementById('reset-form');
      const msg = document.getElementById('message');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        msg.textContent = '';
        const t = tokenInput.value && tokenInput.value.trim();
        const p = document.getElementById('password').value;
        const p2 = document.getElementById('password2').value;
        if (!t) { msg.style.color = 'red'; msg.textContent = 'Token is required.'; return; }
        if (!p || p.length < 4) { msg.style.color = 'red'; msg.textContent = 'Password must be at least 4 characters.'; return; }
        if (p !== p2) { msg.style.color = 'red'; msg.textContent = 'Passwords do not match.'; return; }

        try {
          const res = await fetch('/auth/reset', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ token: t, password: p })
          });
          const data = await res.json();
          if (res.ok) {
            msg.style.color = 'green';
            msg.textContent = 'Password updated. Redirecting to login...';
            setTimeout(() => { window.location.href = 'index.html'; }, 1500);
          } else {
            msg.style.color = 'red';
            msg.textContent = data.message || 'Failed to reset password.';
          }
        } catch (err) {
          console.error('Reset error', err);
          msg.style.color = 'red';
          msg.textContent = 'Server error. Try again later.';
        }
      });

      // Password visibility toggles
      const toggleResetPassword = document.getElementById('toggle-reset-password');
      if (toggleResetPassword) {
        toggleResetPassword.addEventListener('click', (e) => {
          e.preventDefault();
          const passwordInput = document.getElementById('password');
          if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleResetPassword.textContent = '🙈';
          } else {
            passwordInput.type = 'password';
            toggleResetPassword.textContent = '👁️';
          }
        });
      }

      const toggleResetPassword2 = document.getElementById('toggle-reset-password2');
      if (toggleResetPassword2) {
        toggleResetPassword2.addEventListener('click', (e) => {
          e.preventDefault();
          const passwordInput2 = document.getElementById('password2');
          if (passwordInput2.type === 'password') {
            passwordInput2.type = 'text';
            toggleResetPassword2.textContent = '🙈';
          } else {
            passwordInput2.type = 'password';
            toggleResetPassword2.textContent = '👁️';
          }
        });
      }
    });
  </script>
</body>
</html>
