<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Chat</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="chat-container" id="chat-container">
        <div class="chat-shell">
            <div id="profile-overlay" class="profile-overlay"></div>
            <aside class="profile-panel" id="profile-panel">
                <div class="profile-header">
                    <div id="profile-username" class="profile-username"></div>
                    <div id="profile-location" class="profile-location"></div>
                </div>
                <div class="profile-section-title">mybit</div>
                <div id="profile-interactions" class="profile-interactions"></div>
            </aside>
            <div class="chat-main">
                <div class="chat-header-bar">
                    <div class="chat-header-left">
                        <h2 id="chat-header">Welcome to Web Chat</h2>
                        <span id="guest-badge" class="guest-badge hidden">Guest (Read-only)</span>
                    </div>
                    <div class="chat-header-right">
                        <div id="auth-actions-guest" class="auth-actions hidden">
                            <button type="button" id="header-login-btn" class="header-auth-btn">Log in</button>
                            <button type="button" id="header-register-btn" class="header-auth-btn">Register</button>
                        </div>
                        <div id="user-info" class="user-info hidden">
                            <span id="current-user"></span>
                        </div>
                        <button id="toggle-profile" class="toggle-profile-btn hidden">☰ mybit</button>
                        <button id="search-btn" type="button">Search</button>
                    </div>
                </div>

                <div id="guest-location-bar" class="guest-location-bar hidden">
                    <label for="guest-state">State</label>
                    <select id="guest-state" aria-label="Browse by state">
                        <option value="">Select State</option>
                    </select>
                    <label for="guest-lga">LGA</label>
                    <select id="guest-lga" aria-label="Browse by LGA">
                        <option value="">Select LGA</option>
                    </select>
                    <button type="button" id="guest-browse-btn">Browse</button>
                </div>

                <div id="search-wrapper">
                    <input type="text" id="search-input" placeholder="Search messages in this location..." aria-label="Search messages">
                </div>
                <div id="chat-messages">
                    <p class="feed-hint">Select a State and LGA above, then click Browse.</p>
                </div>
                <div id="message-form-wrapper">
                    <div id="message" contenteditable="true" data-placeholder="Log in to post what you want done…" aria-label="What do you want done?" class="guest-disabled"></div>
                    <div id="hint-text"></div>
                    <div class="message-actions-row">
                        <button id="attach-btn" type="button" aria-label="Attach file" disabled>📎 Attach</button>
                        <span id="attachment-name"></span>
                        <input type="file" id="attachment-input" style="display:none" accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt" disabled>
                        <button id="send-btn" type="button" aria-label="Send message" disabled>Send</button>
                    </div>
                </div>
                <button id="logout" type="button" class="hidden">Logout</button>
            </div>
        </div>
    </div>

    <!-- Login modal -->
    <div id="login-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Log in to Web Chat</h2>
                <button type="button" id="close-modal" class="close-btn" aria-label="Close">&times;</button>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-row">
                        <input type="password" id="login-password" name="password" autocomplete="current-password" required>
                        <button type="button" id="toggle-login-password" aria-label="Show password">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="login-state">State</label>
                    <select id="login-state" name="state" required>
                        <option value="">Select State</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="login-lga">Local Government</label>
                    <select id="login-lga" name="lga" required>
                        <option value="">Select LGA</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Log in</button>
                <div id="login-error" class="error"></div>
            </form>
            <div class="modal-footer">
                <p>Don't have an account? <a href="#" id="toggle-register">Register here</a></p>
                <p><a href="#" id="forgot-link">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <!-- Register modal -->
    <div id="register-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create account</h2>
                <button type="button" id="close-register-modal" class="close-btn" aria-label="Close">&times;</button>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" name="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email (optional)</label>
                    <input type="email" id="reg-email" name="email" autocomplete="email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <div class="password-row">
                        <input type="password" id="reg-password" name="password" autocomplete="new-password" required>
                        <button type="button" id="toggle-reg-password" aria-label="Show password">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="register-state">State</label>
                    <select id="register-state" name="state" required>
                        <option value="">Select State</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="register-lga">Local Government</label>
                    <select id="register-lga" name="lga" required>
                        <option value="">Select LGA</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Register</button>
                <div id="register-error" class="error"></div>
            </form>
            <div class="modal-footer">
                <p>Already have an account? <a href="#" id="toggle-login">Log in here</a></p>
            </div>
        </div>
    </div>

    <script src="js/locations.js?v=10"></script>
    <script src="js/session.js?v=10"></script>
    <script src="js/feed-view.js?v=10"></script>
    <script src="js/modals.js?v=10"></script>
    <script src="js/auth.js?v=10"></script>
    <script src="js/guest.js?v=10"></script>
    <script src="js/chat.js?v=10"></script>
    <script src="js/app.js?v=10"></script>
</body>
</html>
