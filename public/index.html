<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mybit</title>
    <link rel="stylesheet" href="css/style.css?v=35">
</head>
<body>
    <div class="chat-container" id="chat-container">
        <div class="chat-shell">
            <div id="profile-overlay" class="profile-overlay"></div>
            <aside class="profile-panel" id="profile-panel">
                <div class="app-brand">
                    <span class="app-wordmark" aria-label="mybit">mybit</span>
                </div>
                <div class="sidebar-auth-content">
                <div class="profile-header">
                    <div id="profile-username" class="profile-username"></div>
                    <div id="profile-location" class="profile-location"></div>
                </div>
                <div id="mybits-sidebar-heading" class="mybits-sidebar-heading">
                    <span class="profile-section-title">mybits</span>
                    <span id="mybits-sidebar-badge" class="mybits-badge hidden" aria-live="polite"></span>
                </div>
                <p id="mybits-activity-hint" class="mybits-activity-hint hidden" aria-live="polite"></p>
                <div id="profile-interactions" class="profile-interactions"></div>
                </div>
            </aside>
            <div class="chat-main">
                <header class="app-top-bar">
                    <span class="app-wordmark app-top-bar-logo" aria-label="mybit">mybit</span>
                    <div id="guest-location-bar" class="guest-location-bar hidden">
                        <div class="location-filters">
                            <div class="location-filter-group">
                                <label for="guest-state">State</label>
                                <span class="select-shell">
                                    <select id="guest-state" aria-label="Browse by state">
                                        <option value="">Select State</option>
                                    </select>
                                </span>
                            </div>
                            <div class="location-filter-group">
                                <label for="guest-lga">LGA</label>
                                <span class="select-shell">
                                    <select id="guest-lga" aria-label="Browse by LGA">
                                        <option value="">Select LGA</option>
                                    </select>
                                </span>
                            </div>
                        </div>
                    </div>
                </header>

                <button type="button" id="mybits-tab-btn" class="mybits-tab" aria-label="Open mybits">
                    <span class="mybits-tab-icon" aria-hidden="true">☰</span>
                    <span class="mybits-tab-title">mybits</span>
                    <span id="mybits-badge" class="mybits-badge hidden" aria-live="polite"></span>
                    <span class="mybits-tab-chevron" aria-hidden="true">›</span>
                </button>

                <div id="search-wrapper">
                    <input type="text" id="search-input" placeholder="Search messages in this location..." aria-label="Search messages">
                </div>
                <div id="chat-messages">
                    <p class="feed-hint">Select a State and LGA to view messages.</p>
                </div>
                <div id="message-form-wrapper">
                    <div id="message" contenteditable="true" data-placeholder="What do you want done?" aria-label="What do you want done?" class="guest-disabled"></div>
                    <div id="hint-text"></div>
                    <div class="message-actions-row">
                        <button id="attach-btn" type="button" aria-label="Attach file" disabled>📎 Attach</button>
                        <span id="attachment-name"></span>
                        <input type="file" id="attachment-input" style="display:none" accept="image/*,video/*,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt" disabled>
                        <button id="send-btn" type="button" aria-label="Send message" disabled>Send</button>
                    </div>
                </div>
                <button id="logout" type="button" class="hidden">Logout</button>
            </div>
        </div>
    </div>

    <!-- Share modal -->
    <div id="share-modal" class="modal hidden" role="dialog" aria-labelledby="share-modal-title" aria-modal="true">
        <div class="modal-content share-modal-content">
            <div class="modal-header">
                <h2 id="share-modal-title">Share message</h2>
                <button type="button" id="close-share-modal" class="close-btn" aria-label="Close">&times;</button>
            </div>
            <div class="share-modal-body">
                <p class="share-modal-preview"></p>
                <div class="share-platforms">
                    <button type="button" class="share-platform-btn share-platform-whatsapp" data-platform="whatsapp">WhatsApp</button>
                    <button type="button" class="share-platform-btn share-platform-twitter" data-platform="twitter">X / Twitter</button>
                    <button type="button" class="share-platform-btn share-platform-facebook" data-platform="facebook">Facebook</button>
                </div>
                <button type="button" id="share-copy-link" class="submit-btn share-copy-btn">Copy link</button>
            </div>
        </div>
    </div>

    <!-- Login modal -->
    <div id="login-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Log in to Web Chat</h2>
                <button type="button" id="close-modal" class="close-btn" aria-label="Close">&times;</button>
            </div>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-username">Username</label>
                    <input type="text" id="login-username" name="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-row">
                        <input type="password" id="login-password" name="password" autocomplete="current-password" required>
                        <button type="button" id="toggle-login-password" aria-label="Show password">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="login-state">State</label>
                    <select id="login-state" name="state" required>
                        <option value="">Select State</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="login-lga">Local Government</label>
                    <select id="login-lga" name="lga" required>
                        <option value="">Select LGA</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Log in</button>
                <div id="login-error" class="error"></div>
            </form>
            <div class="modal-footer">
                <p>Don't have an account? <a href="#" id="toggle-register">Register here</a></p>
                <p><a href="#" id="forgot-link">Forgot password?</a></p>
            </div>
        </div>
    </div>

    <!-- Register modal -->
    <div id="register-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Create account</h2>
                <button type="button" id="close-register-modal" class="close-btn" aria-label="Close">&times;</button>
            </div>
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-username">Username</label>
                    <input type="text" id="reg-username" name="username" autocomplete="username" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email (optional)</label>
                    <input type="email" id="reg-email" name="email" autocomplete="email" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <div class="password-row">
                        <input type="password" id="reg-password" name="password" autocomplete="new-password" required>
                        <button type="button" id="toggle-reg-password" aria-label="Show password">👁️</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="register-state">State</label>
                    <select id="register-state" name="state" required>
                        <option value="">Select State</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="register-lga">Local Government</label>
                    <select id="register-lga" name="lga" required>
                        <option value="">Select LGA</option>
                    </select>
                </div>
                <button type="submit" class="submit-btn">Register</button>
                <div id="register-error" class="error"></div>
            </form>
            <div class="modal-footer">
                <p>Already have an account? <a href="#" id="toggle-login">Log in here</a></p>
            </div>
        </div>
    </div>

    <script src="js/security.js?v=35"></script>
    <script src="js/locations.js?v=35"></script>
    <script src="js/session.js?v=35"></script>
    <script src="js/feed-view.js?v=35"></script>
    <script src="js/location-feed.js?v=35"></script>
    <script src="js/modals.js?v=35"></script>
    <script src="js/auth.js?v=35"></script>
    <script src="js/guest.js?v=35"></script>
    <script src="js/mybits.js?v=35"></script>
    <script src="js/share.js?v=35"></script>
    <script src="js/chat.js?v=35"></script>
    <script src="js/app.js?v=35"></script>
</body>
</html>
