<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/admin/admin.css">
</head>
<body class="admin-page">
    <nav class="admin-nav" id="admin-nav" style="display:none"></nav>

    <div id="admin-login" class="admin-login-wrap"></div>

    <main class="admin-main" id="admin-content" style="display:none">
        <h1>Admin Panel</h1>
        <p style="color:#666;">Manage flagged messages, users, and site data.</p>
        <div class="admin-hub-grid">
            <a class="admin-hub-card" href="/admin/review">
                <div class="hub-icon">🚩</div>
                <h2>Review Queue</h2>
                <p>Approve or reject flagged messages and user reports.</p>
            </a>
            <a class="admin-hub-card" href="/admin-db">
                <div class="hub-icon">🗄️</div>
                <h2>Database &amp; Analytics</h2>
                <p>View messages, users, run queries, ban users, and export data.</p>
            </a>
        </div>
    </main>

    <script src="/admin/admin-auth.js"></script>
    <script>
        AdminAuth.initPage({
            loginEl: 'admin-login',
            contentEl: 'admin-content',
            navEl: 'admin-nav',
            active: 'hub',
            onReady() {
                document.getElementById('admin-nav').style.display = '';
            }
        });
    </script>
</body>
</html>
